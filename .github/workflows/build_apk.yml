name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK with Buildozer
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Checkout code ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ──
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ── 3. Install system dependencies ──
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip wget \
            openjdk-17-jdk \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            ccache \
            build-essential

      # ── 4. Install Buildozer & Cython ──
      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer cython

      # ── 5. Cache Buildozer global directory ──
      - name: Cache Buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # ── 6. Cache Android SDK/NDK ──
      - name: Cache Android SDK/NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.android
            ~/.buildozer/android/platform
          key: android-sdk-ndk-${{ runner.os }}-v5
          restore-keys: |
            android-sdk-ndk-${{ runner.os }}-

      # ── 7. Install Android cmdline-tools and fix sdkmanager path ──
      - name: Install Android SDK cmdline-tools
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          CMDLINE_DIR="$SDK_DIR/cmdline-tools/latest"

          # Only install if sdkmanager not already cached
          if [ ! -f "$CMDLINE_DIR/bin/sdkmanager" ]; then
            echo "Downloading Android cmdline-tools..."
            mkdir -p /tmp/cmdline-tools-dl
            wget -q "https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip" \
              -O /tmp/cmdline-tools.zip
            unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-dl
            mkdir -p "$CMDLINE_DIR"
            mv /tmp/cmdline-tools-dl/cmdline-tools/* "$CMDLINE_DIR/"
            echo "cmdline-tools installed."
          else
            echo "cmdline-tools already cached, skipping download."
          fi

          # Create legacy symlinks at tools/bin/ where buildozer looks
          mkdir -p "$SDK_DIR/tools/bin"
          ln -sf "$CMDLINE_DIR/bin/sdkmanager"  "$SDK_DIR/tools/bin/sdkmanager"  || true
          ln -sf "$CMDLINE_DIR/bin/avdmanager"  "$SDK_DIR/tools/bin/avdmanager"  || true

          # Create license files manually to be absolutely sure
          SDK_LICENSES="$SDK_DIR/licenses"
          mkdir -p "$SDK_LICENSES"
          printf '\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee' > "$SDK_LICENSES/android-sdk-license"
          printf '\n84831b9409646a918e30573bab4c9c91346d8abd' > "$SDK_LICENSES/android-sdk-preview-license"
          printf '\n859f317696f67ef3d7f30a50a5560e7834b43903' > "$SDK_LICENSES/android-sdk-arm-dbt-license"
          printf '\nd975f751698a77b662f1254ddbeed3901e976f5a' > "$SDK_LICENSES/intel-android-extra-license"

          echo "Accepting SDK licenses..."
          yes | "$CMDLINE_DIR/bin/sdkmanager" \
            --sdk_root="$SDK_DIR" \
            --licenses 2>/dev/null || true

      # ── 8. Build APK ──
      - name: Build APK
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee build.log
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
          ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk

      # ── 9. Print build errors inline if failed ──
      - name: Print build errors
        if: failure()
        run: |
          echo "==== LAST 500 LINES OF BUILD LOG ===="
          tail -n 500 build.log
          echo "==== END OF LOG ===="

      # ── 10. List output files for debugging ──
      - name: List build output
        if: always()
        run: |
          echo "=== Contents of bin/ ==="
          ls -la bin/ 2>/dev/null || echo "bin/ directory not found"
          echo ""
          echo "=== Searching for any .apk files ==="
          find . -name "*.apk" 2>/dev/null || echo "No .apk files found"

      # ── 11. Upload APK ──
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YouTubeDownloader-APK
          path: bin/*.apk
          if-no-files-found: error

      # ── 12. Always upload build log ──
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore
