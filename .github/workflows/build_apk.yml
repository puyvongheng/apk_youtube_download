name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK with Buildozer
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Checkout code ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ──
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ── 3. Install system dependencies ──
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip \
            openjdk-17-jdk \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            ccache \
            build-essential

      # ── 4. Install Buildozer & Cython ──
      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer cython==0.29.36

      # ── 5. Cache Buildozer global directory ──
      - name: Cache Buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # ── 6. Cache Android SDK/NDK ──
      - name: Cache Android SDK/NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.android
            ~/.buildozer/android/platform
          key: android-sdk-ndk-${{ runner.os }}-v3
          restore-keys: |
            android-sdk-ndk-${{ runner.os }}-

      # ── 7. Build APK (pipefail ensures errors are caught) ──
      - name: Build APK
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee build.log
          echo "Build exit code: $?"
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      # ── 8. List output files for debugging ──
      - name: List build output
        if: always()
        run: |
          echo "=== Contents of bin/ ==="
          ls -la bin/ 2>/dev/null || echo "bin/ directory not found"
          echo ""
          echo "=== Searching for any .apk files ==="
          find . -name "*.apk" 2>/dev/null || echo "No .apk files found"

      # ── 9. Upload APK ──
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YouTubeDownloader-APK
          path: bin/*.apk
          if-no-files-found: error

      # ── 10. Upload build log (always, for debugging) ──
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore
