name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK with Buildozer
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip wget curl \
            openjdk-17-jdk \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            ccache \
            build-essential

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer cython==0.29.36

      - name: Cache Buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Cache Android SDK/NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.android
            ~/.buildozer/android/platform
          key: android-sdk-ndk-${{ runner.os }}-v5
          restore-keys: |
            android-sdk-ndk-${{ runner.os }}-

      - name: Install Android SDK cmdline-tools
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          CMDLINE_DIR="$SDK_DIR/cmdline-tools/latest"

          if [ ! -f "$CMDLINE_DIR/bin/sdkmanager" ]; then
            mkdir -p /tmp/cmdline-tools-dl
            wget -q "https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip" -O /tmp/cmdline-tools.zip
            unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-dl
            mkdir -p "$CMDLINE_DIR"
            mv /tmp/cmdline-tools-dl/cmdline-tools/* "$CMDLINE_DIR/"
          fi

          mkdir -p "$SDK_DIR/tools/bin"
          ln -sf "$CMDLINE_DIR/bin/sdkmanager"  "$SDK_DIR/tools/bin/sdkmanager"  || true
          ln -sf "$CMDLINE_DIR/bin/avdmanager"  "$SDK_DIR/tools/bin/avdmanager"  || true

          SDK_LICENSES="$SDK_DIR/licenses"
          mkdir -p "$SDK_LICENSES"
          printf '\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee' > "$SDK_LICENSES/android-sdk-license"
          printf '\n84831b9409646a918e30573bab4c9c91346d8abd' > "$SDK_LICENSES/android-sdk-preview-license"
          printf '\n859f317696f67ef3d7f30a50a5560e7834b43903' > "$SDK_LICENSES/android-sdk-arm-dbt-license"
          printf '\nd975f751698a77b662f1254ddbeed3901e976f5a' > "$SDK_LICENSES/intel-android-extra-license"

          yes | "$CMDLINE_DIR/bin/sdkmanager" --sdk_root="$SDK_DIR" --licenses 2>/dev/null || true

      - name: Build APK
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee build.log
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
          ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk

      - name: Upload Error Log to Pastebin
        if: always()
        run: |
          echo "==== EXTRACTING LAST 500 LINES OF LOG ===="
          tail -n 500 build.log > build_tail.log
          echo "Uploading to 0x0.st..."
          URL=$(curl -s -F 'file=@build_tail.log' https://0x0.st)
          echo "========================================="
          echo "ERROR LOG UPLOADED TO:"
          echo "$URL"
          echo "========================================="
          echo "Please share the above URL with the AI."

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YouTubeDownloader-APK
          path: bin/*.apk
          if-no-files-found: ignore
