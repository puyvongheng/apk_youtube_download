name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK with Buildozer
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Checkout code ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ──
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ── 3. Install system dependencies ──
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip wget \
            openjdk-17-jdk \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            ccache \
            build-essential

      # ── 4. Install Buildozer & Cython ──
      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer cython==0.29.36

      # ── 5. Cache Buildozer global directory ──
      - name: Cache Buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # ── 6. Cache Android SDK/NDK ──
      - name: Cache Android SDK/NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.android
            ~/.buildozer/android/platform
          key: android-sdk-ndk-${{ runner.os }}-v5
          restore-keys: |
            android-sdk-ndk-${{ runner.os }}-

      # ── 7. Install Android cmdline-tools and fix sdkmanager path ──
      #    Modern Android SDK moved sdkmanager from tools/bin/ to cmdline-tools/latest/bin/
      #    Buildozer still looks at the OLD path, so we install cmdline-tools
      #    and create symlinks at the legacy location buildozer expects.
      - name: Install Android SDK cmdline-tools
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          CMDLINE_DIR="$SDK_DIR/cmdline-tools/latest"

          # Only install if sdkmanager not already cached
          if [ ! -f "$CMDLINE_DIR/bin/sdkmanager" ]; then
            echo "Downloading Android cmdline-tools..."
            mkdir -p /tmp/cmdline-tools-dl
            wget -q "https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip" \
              -O /tmp/cmdline-tools.zip
            unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-dl
            mkdir -p "$CMDLINE_DIR"
            mv /tmp/cmdline-tools-dl/cmdline-tools/* "$CMDLINE_DIR/"
            echo "cmdline-tools installed."
          else
            echo "cmdline-tools already cached, skipping download."
          fi

          # Create legacy symlinks at tools/bin/ where buildozer looks
          mkdir -p "$SDK_DIR/tools/bin"
          ln -sf "$CMDLINE_DIR/bin/sdkmanager"  "$SDK_DIR/tools/bin/sdkmanager"  || true
          ln -sf "$CMDLINE_DIR/bin/avdmanager"  "$SDK_DIR/tools/bin/avdmanager"  || true
          echo "Symlinks created:"
          ls -la "$SDK_DIR/tools/bin/"

          # Accept all SDK licenses
          echo "Accepting SDK licenses..."
          yes | "$CMDLINE_DIR/bin/sdkmanager" \
            --sdk_root="$SDK_DIR" \
            --licenses 2>/dev/null || true

          # Pre-install required SDK components
          echo "Installing SDK components..."
          "$CMDLINE_DIR/bin/sdkmanager" \
            --sdk_root="$SDK_DIR" \
            "platform-tools" \
            "build-tools;34.0.0" \
            "platforms;android-33"

          echo "Android SDK setup complete!"
          ls "$SDK_DIR/"

      # ── 8. Build APK ──
      - name: Build APK
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee build.log
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
          ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk

      # ── 9. List output files for debugging ──
      - name: List build output
        if: always()
        run: |
          echo "=== Contents of bin/ ==="
          ls -la bin/ 2>/dev/null || echo "bin/ directory not found"
          echo ""
          echo "=== Searching for any .apk files ==="
          find . -name "*.apk" 2>/dev/null || echo "No .apk files found"

      # ── 10. Upload APK ──
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YouTubeDownloader-APK
          path: bin/*.apk
          if-no-files-found: error

      # ── 11. Always upload build log ──
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore
